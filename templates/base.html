{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RecoverIt{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .sidebar { min-height: 100vh; background-color: #212529; }
        .sidebar .nav-link { color: #adb5bd; }
        .sidebar .nav-link.active, .sidebar .nav-link:hover { color: #fff; background-color: #343a40; }
        .card-stat { border: none; border-radius: 0.75rem; }
    </style>
</head>
<body>
<div class="d-flex">
    <nav class="sidebar d-flex flex-column flex-shrink-0 p-3" style="width: 240px;">
        <a href="{% url 'dashboard:index' %}" class="d-flex align-items-center mb-3 text-white text-decoration-none">
            <span class="fs-4">RecoverIt</span>
        </a>
        <hr class="text-secondary">
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="{% url 'dashboard:index' %}" class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}">Dashboard</a>
            </li>
            <li>
                <a href="{% url 'dashboard:users' %}" class="nav-link {% if request.resolver_match.url_name == 'users' %}active{% endif %}">Users</a>
            </li>
            <li>
                <a href="{% url 'dashboard:lost_items' %}" class="nav-link {% if request.resolver_match.url_name == 'lost_items' %}active{% endif %}">Lost Items</a>
            </li>
            <li>
                <a href="{% url 'dashboard:found_items' %}" class="nav-link {% if request.resolver_match.url_name == 'found_items' %}active{% endif %}">Found Items</a>
            </li>
            <li>
                <a href="{% url 'dashboard:claims' %}" class="nav-link {% if request.resolver_match.url_name == 'claims' %}active{% endif %}">Claims</a>
            </li>
        </ul>
        <hr class="text-secondary">
        <form method="post" action="{% url 'accounts:logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-light w-100">Logout</button>
        </form>
    </nav>

    <main class="flex-grow-1 p-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
